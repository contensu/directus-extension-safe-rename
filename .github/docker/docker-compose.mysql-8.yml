services:
  database:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: directus
      MYSQL_DATABASE: directus
      MYSQL_USER: directus
      MYSQL_PASSWORD: directus
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--host=localhost", "--user=directus", "--password=directus"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  directus:
    image: directus/directus:${DIRECTUS_VERSION:-11.5.1}
    ports:
      - 8055:8055
    volumes:
      - uploads:/directus/uploads
      - ./dist:/directus/extensions/directus-extension-safe-rename/dist
      - ./package.json:/directus/extensions/directus-extension-safe-rename/package.json
    depends_on:
      database:
        condition: service_healthy
    environment:
      SECRET: ci-secret
      DB_CLIENT: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: directus
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: d1r3ctu5
      EXTENSIONS_AUTO_RELOAD: "false"
      CACHE_ENABLED: "false"

volumes:
  uploads: